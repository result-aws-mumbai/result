<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SecurePortal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:      #0d0f14;
  --surf:    #14171e;
  --surf2:   #1c2030;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.14);
  --accent:  #5b8df6;
  --accent2: #7ba3ff;
  --green:   #3ecf8e;
  --red:     #f06464;
  --amber:   #f5a623;
  --text:    #eef0f6;
  --muted:   #8892a4;
  --dim:     #525d72;
  --r-sm:    8px;
  --r-md:    14px;
  --r-lg:    20px;
  --r-xl:    28px;
  --ease:    cubic-bezier(.22,1,.36,1);
}

html{height:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;
  background:var(--bg);
  font-family:'DM Sans',sans-serif;font-size:15px;
  color:var(--text);line-height:1.6;
  display:flex;align-items:center;justify-content:center;
  padding:16px;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%,rgba(91,141,246,.13) 0%,transparent 65%),
    radial-gradient(ellipse 50% 45% at 80% 90%,rgba(62,207,142,.09) 0%,transparent 65%);
}

/* Card */
.card{
  width:100%;max-width:440px;
  position:relative;z-index:1;
  background:var(--surf);
  border:1px solid var(--border2);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:0 8px 48px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
  transition:transform .4s var(--ease),box-shadow .4s var(--ease);
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 64px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06);
}

/* Header */
.card-head{
  padding:36px 36px 28px;
  background:linear-gradient(160deg,var(--surf2) 0%,var(--surf) 100%);
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;text-align:center;
}
.card-head::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(91,141,246,.18) 0%,transparent 70%);
}
.logo-ring{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#2a3a6e,#1e2d55);
  border:1.5px solid rgba(91,141,246,.4);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  position:relative;z-index:1;
  box-shadow:0 0 0 6px rgba(91,141,246,.08),0 4px 16px rgba(0,0,0,.4);
}
.logo-ring svg{width:28px;height:28px;color:var(--accent2)}
.card-head h1{
  font-family:'DM Serif Display',serif;
  font-size:26px;font-weight:400;letter-spacing:-.3px;
  color:var(--text);position:relative;z-index:1;
}
.card-head p{
  font-size:13.5px;color:var(--muted);
  margin-top:5px;position:relative;z-index:1;
}

/* Success header */
.card-head.success{
  background:linear-gradient(160deg,rgba(62,207,142,.14) 0%,var(--surf) 100%);
}
.card-head.success::after{
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(62,207,142,.18) 0%,transparent 70%);
}
.card-head.success .logo-ring{
  background:linear-gradient(135deg,#1a4a38,#133328);
  border-color:rgba(62,207,142,.4);
  box-shadow:0 0 0 6px rgba(62,207,142,.08),0 4px 16px rgba(0,0,0,.4);
}
.card-head.success .logo-ring svg{color:var(--green)}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(62,207,142,.12);
  border:1px solid rgba(62,207,142,.25);
  color:var(--green);
  padding:6px 14px;border-radius:var(--r-xl);
  font-size:12px;font-weight:600;letter-spacing:.4px;
  margin-top:14px;position:relative;z-index:1;
}
.badge svg{width:13px;height:13px}

/* Body */
.card-body{padding:28px 32px 32px}

/* Fields */
.field+.field{margin-top:18px}
label{
  display:block;font-size:11.5px;font-weight:600;
  letter-spacing:.65px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.iw{position:relative;display:flex;align-items:center}
.iw svg.ico{
  position:absolute;left:14px;
  width:16px;height:16px;color:var(--dim);pointer-events:none;
}
.iw input{
  width:100%;padding:13px 44px 13px 42px;
  background:var(--surf2);
  border:1.5px solid var(--border2);
  border-radius:var(--r-md);
  color:var(--text);font-size:15px;
  font-family:'DM Sans',sans-serif;
  outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.iw input::placeholder{color:var(--dim)}
.iw input:hover{border-color:rgba(255,255,255,.22)}
.iw input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(91,141,246,.15);
  background:rgba(28,32,48,.8);
}
.btn-eye{
  position:absolute;right:12px;
  background:none;border:none;cursor:pointer;
  color:var(--dim);padding:4px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:color .2s;
}
.btn-eye:hover{color:var(--accent2)}

/* Attempt row */
.attempt-row{
  display:flex;justify-content:space-between;
  margin-top:10px;font-size:12px;color:var(--dim);
}
.lock-msg{color:var(--red)}

/* Error */
.err{
  margin-top:14px;padding:12px 14px;
  background:rgba(240,100,100,.1);
  border:1px solid rgba(240,100,100,.25);
  border-radius:var(--r-sm);
  color:var(--red);font-size:13px;
  display:flex;align-items:center;gap:10px;
  animation:slideDown .22s var(--ease);
}
.err svg{width:16px;height:16px;flex-shrink:0}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-5px)}
  to{opacity:1;transform:none}
}

/* Primary button */
.btn-primary{
  width:100%;margin-top:22px;padding:14px;
  background:linear-gradient(135deg,#3a6ef5,#5b8df6 60%,#7ba3ff);
  color:#fff;border:none;border-radius:var(--r-md);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;letter-spacing:.15px;
  box-shadow:0 4px 20px rgba(59,110,245,.35);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s,transform .15s,box-shadow .2s;
}
.btn-primary:hover:not(:disabled){
  opacity:.92;transform:translateY(-1px);
  box-shadow:0 6px 28px rgba(59,110,245,.45);
}
.btn-primary:active:not(:disabled){transform:none}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary .arrow{width:16px;height:16px;transition:transform .2s}
.btn-primary:hover:not(:disabled) .arrow{transform:translateX(4px)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:16px;height:16px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.25);
  border-top-color:#fff;
  animation:spin .65s linear infinite;flex-shrink:0;
}

/* Demo hint */
.demo-hint{
  margin-top:20px;padding:13px 15px;
  background:rgba(255,255,255,.03);
  border:1px dashed var(--border2);
  border-radius:var(--r-md);
  font-size:12.5px;color:var(--muted);
}
.demo-hint strong{color:var(--text)}
code{
  background:rgba(91,141,246,.15);color:var(--accent2);
  padding:2px 7px;border-radius:5px;
  font-family:monospace;font-size:12px;
}

.hidden{display:none!important}

/* Result body */
.result-body{padding:22px 28px 28px}

.user-row{
  display:flex;align-items:center;justify-content:center;
  gap:7px;color:var(--muted);font-size:13.5px;margin-bottom:20px;
}
.user-row svg{width:14px;height:14px;color:var(--accent2)}

/* Image viewer */
.img-viewer{
  position:relative;
  background:var(--surf2);
  border:1px solid var(--border2);
  border-radius:var(--r-lg);
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none;
  transition:height .3s var(--ease);
}
.img-viewer img{
  width:100%;display:block;
  cursor:zoom-in;
  transform-origin:center top;
  transition:transform .35s var(--ease),filter .3s;
  will-change:transform;
  -webkit-user-drag:none;pointer-events:auto;
}
.img-viewer img.zoomed{cursor:zoom-out}

/* Zoom bar */
.zoom-bar{
  position:absolute;bottom:10px;right:10px;
  display:flex;align-items:center;gap:5px;
}
.zbtn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  border:1px solid var(--border2);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;line-height:1;
  transition:background .2s,transform .15s;
  user-select:none;
}
.zbtn:hover{background:rgba(91,141,246,.35);transform:scale(1.1)}
.zlabel{
  font-size:11px;color:var(--muted);
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  padding:3px 8px;border-radius:5px;
  border:1px solid var(--border);pointer-events:none;
  min-width:42px;text-align:center;
}

.img-caption{
  display:flex;align-items:center;justify-content:center;gap:6px;
  color:var(--dim);font-size:12px;margin-top:12px;
}
.img-caption svg{width:12px;height:12px;color:var(--amber)}

/* Session row */
.session-row{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;margin-top:20px;
  padding:13px 15px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:var(--r-md);
}
.sess-info{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
.sess-info svg{width:14px;height:14px;color:var(--green)}

.btn-logout{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;background:none;
  border:1.5px solid var(--border2);border-radius:var(--r-sm);
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;
  transition:border-color .2s,color .2s,background .2s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red);background:rgba(240,100,100,.08)}
.btn-logout svg{width:14px;height:14px}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.93);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  position:relative;
  max-width:94vw;max-height:94vh;
  transform:scale(.94);
  transition:transform .3s var(--ease);
}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-box img{
  max-width:100%;max-height:90vh;
  border-radius:var(--r-md);display:block;
  pointer-events:none;
  -webkit-user-drag:none;user-select:none;
}
.modal-close{
  position:absolute;top:-13px;right:-13px;
  width:34px;height:34px;border-radius:50%;
  background:var(--surf2);border:1px solid var(--border2);
  color:var(--text);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s,color .2s;
}
.modal-close:hover{background:rgba(240,100,100,.25);color:var(--red);transform:scale(1.1)}

/* Responsive */
@media(max-width:480px){
  .card{border-radius:var(--r-lg)}
  .card-head{padding:26px 22px 22px}
  .card-body{padding:22px 20px 24px}
  .result-body{padding:18px 18px 22px}
  .session-row{flex-direction:column;align-items:stretch}
  .btn-logout{justify-content:center}
}
@media(max-width:360px){
  .card-head h1{font-size:22px}
  .logo-ring{width:56px;height:56px}
  .logo-ring svg{width:24px;height:24px}
}

/* Print kill */
@media print{
  body>*{display:none!important}
  body::after{
    content:'This content is protected.';
    display:block;text-align:center;
    margin-top:40vh;font-size:18px;color:#333;
  }
}
</style>

            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>

      <div class="demo-hint">
        Ray ID &mdash; <strong>9dc91ad46d8995ab</strong>

             alt="Your secure result"
             draggable="false"
             oncontextmenu="return false"
             ondragstart="return false">

        <div class="zoom-bar">
          <button class="zbtn" id="btn-zoom-out" title="Zoom out">&minus;</button>
          <span class="zlabel" id="zoom-label">100%</span>
          <button class="zbtn" id="btn-zoom-in" title="Zoom in">+</button>
        </div>
      </div>

      <p class="img-caption">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Private result &mdash; tap image to expand &middot; view only
      </p>

      <div class="session-row">
        <div class="sess-info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="sess-expiry">Session expires in 60:00</span>
        </div>
        <button class="btn-logout" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </div>
  </div>

</div><!-- /card -->

<!-- Fullscreen modal -->
<div class="modal-overlay" id="modal-overlay" oncontextmenu="return false">
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
    <img id="modal-img" src="" alt="Result expanded"
         draggable="false"
         ondragstart="return false"
         oncontextmenu="return false">
  </div>
</div>

<script>
(function () {
  'use strict';

  /* Config */
  var CRED       = { user: 'self', pass: 'result' };
  var MAX_ATT    = 5;
  var LOCK_MS    = 30000;
  var SESSION_MS = 60 * 60 * 1000;
  var SCALE_STEP = 0.25;
  var SCALE_MAX  = 3;
  var SCALE_MIN  = 0.5;

  /* State */
  var attempts   = 0;
  var lockUntil  = 0;
  var sessionEnd = 0;
  var sessTimer  = null;
  var scale      = 1;

  /* Safe element getter */
  function el(id) {
    var node = document.getElementById(id);
    if (!node) throw new Error('Missing element: #' + id);
    return node;
  }

  /* All elements */
  var loginView    = el('loginView');
  var resultView   = el('resultView');
  var loginForm    = el('loginForm');
  var inpUser      = el('inp-user');
  var inpPass      = el('inp-pass');
  var loginBtn     = el('login-btn');
  var errBox       = el('err-box');
  var errText      = el('err-text');
  var attemptDisp  = el('attempt-disp');
  var lockMsgEl    = el('lock-msg');
  var btnEye       = el('btn-eye');
  var eyeSvg       = el('eye-svg');
  var imgViewer    = el('img-viewer');
  var theImg       = el('the-img');
  var btnZoomIn    = el('btn-zoom-in');
  var btnZoomOut   = el('btn-zoom-out');
  var zoomLabel    = el('zoom-label');
  var sessExpiry   = el('sess-expiry');
  var btnLogout    = el('btn-logout');
  var modalOverlay = el('modal-overlay');
  var modalClose   = el('modal-close');
  var modalImg     = el('modal-img');

  /* ── Zoom ─────────────────────────────────────────────── */
  function applyZoom() {
    theImg.style.transform = 'scale(' + scale + ')';
    zoomLabel.textContent  = Math.round(scale * 100) + '%';
    theImg.classList.toggle('zoomed', scale > 1);

    if (scale > 1 && theImg.naturalWidth > 0) {
      var ratio = theImg.naturalHeight / theImg.naturalWidth;
      imgViewer.style.height = (theImg.offsetWidth * ratio * scale) + 'px';
    } else {
      imgViewer.style.height = '';
    }
  }

  btnZoomIn.addEventListener('click', function () {
    if (scale < SCALE_MAX) { scale = Math.min(SCALE_MAX, +(scale + SCALE_STEP).toFixed(2)); applyZoom(); }
  });
  btnZoomOut.addEventListener('click', function () {
    if (scale > SCALE_MIN) { scale = Math.max(SCALE_MIN, +(scale - SCALE_STEP).toFixed(2)); applyZoom(); }
  });

  /* Click image → fullscreen modal */
  theImg.addEventListener('click', function () {
    modalImg.src = theImg.src;
    modalOverlay.classList.add('open');
  });
  modalClose.addEventListener('click', function () { modalOverlay.classList.remove('open'); });
  modalOverlay.addEventListener('click', function (e) {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') modalOverlay.classList.remove('open');
  });

  /* ── Password toggle ──────────────────────────────────── */
  btnEye.addEventListener('click', function () {
    var show = inpPass.type === 'password';
    inpPass.type = show ? 'text' : 'password';
    eyeSvg.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  /* ── UI helpers ───────────────────────────────────────── */
  function showErr(msg) {
    errText.textContent = msg;
    errBox.classList.remove('hidden');
    /* re-trigger animation */
    errBox.style.animation = 'none';
    void errBox.offsetWidth;
    errBox.style.animation = '';
  }
  function hideErr() { errBox.classList.add('hidden'); }

  function setLoading(on) {
    loginBtn.disabled = on;
    loginBtn.innerHTML = on
      ? '<div class="spinner"></div><span>Verifying\u2026</span>'
      : '<span>Sign In</span><svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }

  function refreshAttemptUI() {
    var locked = Date.now() < lockUntil;
    if (locked) {
      var sec = Math.ceil((lockUntil - Date.now()) / 1000);
      attemptDisp.textContent = 'Account locked';
      lockMsgEl.textContent   = 'Unlock in ' + sec + 's';
      lockMsgEl.classList.remove('hidden');
      loginBtn.disabled = true;
    } else {
      lockMsgEl.classList.add('hidden');
      var rem = MAX_ATT - attempts;
      attemptDisp.textContent = rem + ' attempt' + (rem !== 1 ? 's' : '') + ' remaining';
      /* only re-enable if not in loading state */
      if (!loginBtn.querySelector('.spinner')) loginBtn.disabled = false;
    }
  }

  /* ── Session timer ────────────────────────────────────── */
  function startSessionTimer() {
    if (sessTimer) clearInterval(sessTimer);
    sessTimer = setInterval(function () {
      var left = Math.max(0, sessionEnd - Date.now());
      var m = String(Math.floor(left / 60000)).padStart(2, '0');
      var s = String(Math.floor((left % 60000) / 1000)).padStart(2, '0');
      sessExpiry.textContent = 'Session expires in ' + m + ':' + s;
      if (left <= 0) { clearInterval(sessTimer); doLogout('Session expired.'); }
    }, 1000);
  }

  /* ── View switching ───────────────────────────────────── */
  function showResult() {
    loginView.classList.add('hidden');
    resultView.classList.remove('hidden');
    sessionEnd = Date.now() + SESSION_MS;
    startSessionTimer();
    scale = 1;
    applyZoom();
  }
  function showLogin() {
    if (sessTimer) clearInterval(sessTimer);
    resultView.classList.add('hidden');
    loginView.classList.remove('hidden');
  }

  /* ── Login ────────────────────────────────────────────── */
  loginForm.addEventListener('submit', function (e) {
    e.preventDefault();
    hideErr();

    if (Date.now() < lockUntil) { refreshAttemptUI(); return; }

    var u = inpUser.value.trim();
    var p = inpPass.value;

    if (!u || !p) {
      showErr('Please enter both username and password.');
      return;
    }

    setLoading(true);

    setTimeout(function () {
      if (u === CRED.user && p === CRED.pass) {
        attempts      = 0;
        inpPass.value = '';
        setLoading(false);
        showResult();
      } else {
        attempts++;
        inpPass.value = '';
        if (attempts >= MAX_ATT) {
          lockUntil = Date.now() + LOCK_MS;
          attempts  = 0;
          showErr('Too many attempts. Locked for 30 seconds.');
        } else {
          showErr('Invalid username or password.');
        }
        setLoading(false);
        refreshAttemptUI();
      }
    }, 480);
  });

  /* ── Logout ───────────────────────────────────────────── */
  function doLogout(msg) {
    modalOverlay.classList.remove('open');
    showLogin();
    if (msg) showErr(msg);
  }
  btnLogout.addEventListener('click', function () { doLogout(null); });

  /* ── Tick ─────────────────────────────────────────────── */
  setInterval(refreshAttemptUI, 1000);
  refreshAttemptUI();

  /* ── Protection ───────────────────────────────────────── */
  window.addEventListener('beforeprint', function (e) { e.preventDefault(); });

  document.addEventListener('visibilitychange', function () {
    if (document.hidden && !resultView.classList.contains('hidden')) {
      theImg.style.filter    = 'blur(20px)';
      modalImg.style.filter  = 'blur(20px)';
      setTimeout(function () {
        theImg.style.filter   = '';
        modalImg.style.filter = '';
      }, 1400);
    }
  });

  document.querySelectorAll('img').forEach(function (img) {
    img.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    img.addEventListener('dragstart',   function (e) { e.preventDefault(); });
  });

}());
</script>
</body>
</html>
