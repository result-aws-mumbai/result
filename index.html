<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Expired</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d0f14;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #eef0f6;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #14171e;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: 0 8px 48px rgba(0,0,0,.6);
  }
  .icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg,#3a2020,#2d1a1a);
    border: 1.5px solid rgba(240,100,100,.35);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 0 0 6px rgba(240,100,100,.07);
  }
  .icon svg { width: 26px; height: 26px; color: #f06464; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  p { font-size: 14px; color: #8892a4; line-height: 1.6; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 24px;
    padding: 10px 18px;
    background: rgba(240,100,100,.08);
    border: 1px solid rgba(240,100,100,.2);
    border-radius: 999px;
    font-size: 13px;
    color: #f06464;
  }
  .badge svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <h1>Link Expired</h1>
  <p>This link is no longer active. Please contact your administrator to request a new access link.</p>
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    Contact Admin
  </div>
</div>
</body>
</html>
